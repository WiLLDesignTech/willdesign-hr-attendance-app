name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      stage:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Read AWS region from config
        id: config
        run: |
          REGION=$(node -e "const yaml=require('yaml'); const fs=require('fs'); const c=yaml.parse(fs.readFileSync('config.yaml','utf-8')); console.log(c.deployment?.awsRegion ?? 'ap-northeast-1');")
          echo "aws_region=$REGION" >> "$GITHUB_OUTPUT"

      - name: Build all packages
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ steps.config.outputs.aws_region }}

      - name: CDK Deploy
        working-directory: infra
        run: npx cdk deploy --all --context stage=${{ inputs.stage }} --require-approval never
